name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure LFS files are pulled (defense-in-depth)
        run: git lfs pull

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Prepare Release Artifacts
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Rename JAR with version
          cp target/unidbg-boot-server-*.jar unidbg-boot-server-${VERSION}.jar

          # Copy Legado book source template (original with placeholders)
          cp src/main/resources/legado/fqnovel.json legado-fqnovel-template.json

          # Generate pre-configured book source (127.0.0.1:8099)
          sed 's/\[替换为你的ip或域名\]/127.0.0.1/g; s/\[你的端口号\]/8099/g' \
            src/main/resources/legado/fqnovel.json > legado-fqnovel-preconfigured.json

          # Copy README for the Release page
          cp README.md release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          files: |
            unidbg-boot-server-${{ env.VERSION }}.jar
            legado-fqnovel-template.json
            legado-fqnovel-preconfigured.json
          body_path: release-notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
